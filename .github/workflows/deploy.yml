name: deploy

# Build the Starlight site and deploy it to Firebase Hosting (live channel) on
# every push to main — so a docs-publish sync from the private repo flows straight
# to https://agent-fabric-docs.web.app (→ docs.falconoon.com).
#
# Auth: a GCP service-account JSON in the repo secret FIREBASE_SERVICE_ACCOUNT
# (Firebase Hosting Admin). Until that secret is set, the build still runs as a
# CI check and the deploy step is skipped (no red builds before it's configured).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # Astro 6 requires Node >= 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: deploy to Firebase Hosting (live)
        if: ${{ env.SA != '' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          # Deploy directly instead of FirebaseExtended/action-hosting-deploy@v0: that
          # action mis-parses firebase-tools 15.x --json output (the release version
          # came through as "[object Object]" → 400 FAILED_PRECONDITION; broke 2026-06-25
          # when latest rolled to 15.x), while pinning to 14.x fails to auth on the
          # current runner Node. Letting firebase-tools authenticate via the service
          # account (ADC) and build its own release sidesteps both.
          printf '%s' "$SA" > "$GOOGLE_APPLICATION_CREDENTIALS"
          trap 'rm -f "$GOOGLE_APPLICATION_CREDENTIALS"' EXIT
          npx -y firebase-tools@latest deploy --only hosting \
            --project falconeyes-478614 --non-interactive
