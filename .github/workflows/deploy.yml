name: deploy

# Build the Starlight site and deploy it to Firebase Hosting (live channel) on
# every push to main — so a docs-publish sync from the private repo flows straight
# to https://agent-fabric-docs.web.app (→ docs.falconoon.com).
#
# Auth: a GCP service-account JSON in the repo secret FIREBASE_SERVICE_ACCOUNT
# (Firebase Hosting Admin). Until that secret is set, the build still runs as a
# CI check and the deploy step is skipped (no red builds before it's configured).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: "22" # Astro 6 requires Node >= 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: deploy to Firebase Hosting (live)
        if: ${{ env.SA != '' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          # Deploy directly with the service account (ADC) — not the old
          # action-hosting-deploy@v0, which only obscured the real error below.
          #
          # Real root cause of the 2026-06-25 breakage: firebase-tools 15.x (latest)
          # returns a hard 400 — "supplied version … is the current active version" —
          # when the freshly built site is byte-identical to what's already live, i.e.
          # a no-op deploy. For docs that's success, not failure (nothing changed →
          # nothing to ship), so swallow exactly that case; any other error still fails.
          printf '%s' "$SA" > "$GOOGLE_APPLICATION_CREDENTIALS"
          trap 'rm -f "$GOOGLE_APPLICATION_CREDENTIALS"' EXIT
          set +e
          out="$(npx -y firebase-tools@15.22.4 deploy --only hosting \
            --project falconeyes-478614 --non-interactive 2>&1)"
          rc=$?
          printf '%s\n' "$out"
          if [ $rc -ne 0 ] && printf '%s' "$out" | grep -q "is the current active version"; then
            echo "::notice::docs unchanged — already the live version; treating as success."
            exit 0
          fi
          exit $rc
